# Nginx na VPS (fora do Docker) — domínio taiseyran.com.br
# A app Docker deve estar a correr e a PORT do .env tem de bater com proxy_pass abaixo (por defeito 3010).
#
# Instalação:
#   sudo install -m 644 deploy/nginx-taiseyran-com-br.conf /etc/nginx/sites-available/taiseyran
#   sudo ln -sf /etc/nginx/sites-available/taiseyran /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Depois: Certbot (ver README)

server {
    listen 80;
    listen [::]:80;
    server_name taiseyran.com.br www.taiseyran.com.br;

    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_cache_bypass $http_upgrade;
    }
}
